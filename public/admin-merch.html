<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>King-Youth | Admin — Merch</title>
  <link rel="stylesheet" href="shared.css">
</head>
<body>
<div class="page-wrap">
<div class="admin-layout">
  <div id="admin-nav-root"></div>
  <main class="admin-content">
    <div class="admin-top">
      <h2 class="admin-page-title">Merch / Products</h2>
      <button class="btn btn-primary" onclick="openProductModal()">+ Add Product</button>
    </div>
    <div class="data-table-wrap">
      <div style="overflow-x:auto">
        <table><thead><tr><th>Image</th><th>Product Name</th><th>Category</th><th>Price</th><th>Sizes</th><th>Stock</th><th>Actions</th></tr></thead>
        <tbody id="prodBody"><tr><td colspan="7" style="text-align:center;color:var(--white-dim);padding:2rem">No products yet</td></tr></tbody></table>
      </div>
    </div>
  </main>
</div>
</div>

<!-- PRODUCT MODAL -->
<div class="modal-overlay" id="productModal">
  <div class="modal" style="max-width:600px">
    <button class="modal-close" onclick="closeModal('productModal')">✕</button>
    <h2 class="modal-title" id="prodModalTitle">Add Product</h2>
    <form id="productForm" onsubmit="saveProduct(event)">
      <input type="hidden" id="editId">
      <div class="form-group"><label class="form-label">Product Name <span class="req">*</span></label><input class="form-input" id="pName" placeholder="GREATER Camp Shirt" required></div>
      <div class="form-group"><label class="form-label">Description</label><textarea class="form-textarea" id="pDesc" placeholder="Product description..."></textarea></div>
      <div class="form-grid">
        <div class="form-group"><label class="form-label">Price (₱) <span class="req">*</span></label><input class="form-input" type="number" id="pPrice" placeholder="350" required></div>
        <div class="form-group"><label class="form-label">Stock (blank = unlimited)</label><input class="form-input" type="number" id="pStock" placeholder="50"></div>
        <div class="form-group full"><label class="form-label">Available Sizes (comma separated)</label><input class="form-input" id="pSizes" placeholder="XS, S, M, L, XL, XXL"></div>
        <div class="form-group full"><label class="form-label">Category</label>
          <select class="form-select" id="pCategory"><option>Shirt</option><option>Hoodie</option><option>Accessories</option><option>Sticker</option><option>Cap</option><option>Bag</option><option>Other</option></select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Product Images <span class="req">*</span></label>
        <div class="upload-zone" onclick="document.getElementById('pImgInput').click()">
          <div class="upload-zone-icon">🖼️</div>
          <div class="upload-zone-text">Click or drag to upload product images<br><span>Supports JPG, PNG, WebP</span></div>
          <input type="file" id="pImgInput" accept="image/*" multiple onchange="handleImageUpload(this)">
        </div>
        <div class="upload-previews" id="pPreviews"></div>
      </div>
      <div style="margin-top:1.5rem;display:flex;gap:1rem;justify-content:flex-end">
        <button type="button" class="btn btn-outline" onclick="closeModal('productModal')">Cancel</button>
        <button type="submit" class="btn btn-primary">Save Product</button>
      </div>
    </form>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>
<script src="shared.js"></script>
<script>
  requireAdmin();
  fetch('admin-nav.html').then(r=>r.text()).then(h=>{
    document.getElementById('admin-nav-root').innerHTML=h;
    document.querySelectorAll('.admin-nav-item[data-page]').forEach(a=>{ a.classList.toggle('active', a.dataset.page==='admin-merch.html'); });
  });
  initModalOverlayClose();
  initUploadZones();

  let tempImages = [];
  let allProducts = [];

  async function renderTable() {
    const tbody=document.getElementById('prodBody');
    tbody.innerHTML='<tr><td colspan="7" style="text-align:center;color:var(--white-dim);padding:2rem">Loading…</td></tr>';
    try {
      allProducts = await Products.getAll();
      if (!allProducts.length) { tbody.innerHTML='<tr><td colspan="7" style="text-align:center;color:var(--white-dim);padding:2rem">No products yet</td></tr>'; return; }
      tbody.innerHTML=allProducts.map(p=>`
        <tr>
          <td>
            <div style="width:52px;height:52px;border-radius:8px;overflow:hidden;background:var(--dark);display:flex;align-items:center;justify-content:center;font-size:1.5rem">
              ${p.images&&p.images.length?`<img src="${p.images[0]}" style="width:100%;height:100%;object-fit:cover">`:'👕'}
            </div>
          </td>
          <td><strong>${p.name}</strong>${p.description?`<div style="font-size:.78rem;color:var(--white-dim);margin-top:2px">${p.description.slice(0,60)}${p.description.length>60?'...':''}</div>`:''}
          </td>
          <td>${p.category||'—'}</td>
          <td style="font-family:'Barlow Condensed',sans-serif;font-weight:700;color:var(--accent)">₱${Number(p.price).toLocaleString()}</td>
          <td>${(p.sizes||[]).join(', ')||'—'}</td>
          <td>${p.stock||'∞'}</td>
          <td style="display:flex;gap:.5rem">
            <button class="action-btn" onclick="openProductModal(${p.id})">Edit</button>
            <button class="action-btn del" onclick="deleteProduct(${p.id})">Delete</button>
          </td>
        </tr>
      `).join('');
    } catch(e) { tbody.innerHTML='<tr><td colspan="7" style="text-align:center;color:var(--danger);padding:2rem">Failed to load</td></tr>'; }
  }

  function openProductModal(id=null) {
    document.getElementById('prodModalTitle').textContent=id?'Edit Product':'Add Product';
    document.getElementById('editId').value=id||'';
    tempImages=[];
    document.getElementById('pPreviews').innerHTML='';
    if (id) {
      const p=allProducts.find(x=>x.id===id);
      if (p) {
        document.getElementById('pName').value=(p.name||'');
        document.getElementById('pDesc').value=(p.description||'');
        document.getElementById('pPrice').value=(p.price||'');
        document.getElementById('pStock').value=(p.stock||'');
        document.getElementById('pSizes').value=(p.sizes||[]).join(', ');
        document.getElementById('pCategory').value=(p.category||'Shirt');
        tempImages=p.images||[];
        tempImages.forEach(src=>{ const img=document.createElement('img'); img.src=src; img.className='upload-thumb'; document.getElementById('pPreviews').appendChild(img); });
      }
    } else {
      document.getElementById('productForm').reset();
    }
    openModal('productModal');
  }

  async function handleImageUpload(input) {
    const files=Array.from(input.files);
    tempImages=[];
    document.getElementById('pPreviews').innerHTML='';
    for (const file of files) {
      const data=await readFileAsBase64(file);
      tempImages.push(data);
      const img=document.createElement('img'); img.src=data; img.className='upload-thumb';
      document.getElementById('pPreviews').appendChild(img);
    }
  }

  async function saveProduct(e) {
    e.preventDefault();
    const id=document.getElementById('editId').value;
    const payload={
      images: tempImages,
      name:     document.getElementById('pName').value,
      description: document.getElementById('pDesc').value,
      price:    parseFloat(document.getElementById('pPrice').value),
      stock:    document.getElementById('pStock').value,
      sizes:    document.getElementById('pSizes').value.split(',').map(s=>s.trim()).filter(Boolean),
      category: document.getElementById('pCategory').value
    };
    try {
      if (id) await Products.update(id, payload);
      else await Products.create(payload);
      closeModal('productModal');
      toast('Product saved! 👕','success');
      renderTable();
    } catch(err) { toast('Save failed: '+err.message,'error'); }
  }

  async function deleteProduct(id) {
    if (!confirm('Delete this product?')) return;
    try {
      await Products.delete(id);
      toast('Product deleted.','info');
      renderTable();
    } catch(err) { toast('Delete failed: '+err.message,'error'); }
  }

  renderTable();
</script>
</body>
</html>
