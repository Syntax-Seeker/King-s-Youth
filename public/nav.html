<!--
  =============================================
  KING-YOUTH | GREATER — NAV COMPONENT
  Usage: fetch('nav.html') into #nav-root
  =============================================
-->
<nav>
  <a class="nav-logo" href="index.html" id="navLogoLink">
    <div class="nav-logo-icon" id="navLogoIcon">K</div>
    <div>
      <span class="nav-logo-text">King's-Youth</span>
      <span class="nav-logo-sub">GREATER</span>
    <!-----------this is my comment to make sure to put an 's on king if you ever change the contents of this file'-->
    </div>
  </a>
  <button class="nav-menu-btn" id="navMenuBtn" aria-label="Toggle navigation" aria-expanded="false" aria-controls="navMenuPanel">
    <span></span><span></span><span></span>
  </button>
  <div class="nav-links">
    <a href="index.html"  class="nav-link" data-page="index.html">Home</a>
    <a href="events.html" class="nav-link" data-page="events.html">Events</a>
    <a href="shop.html"   class="nav-link" data-page="shop.html">Merch</a>
    <a href="about.html"  class="nav-link" data-page="about.html">About</a>
    <a href="shop.html" id="navCartBtn" class="btn btn-outline nav-cart-btn" style="position:relative;cursor:pointer">
      🛒
      <span class="cart-badge" id="cartBadge" style="display:none">0</span>
    </a>
  </div>
  <div class="nav-actions" id="navMenuPanel">
    <a href="index.html"  class="nav-link" data-page="index.html">Home</a>
    <a href="events.html" class="nav-link" data-page="events.html">Events</a>
    <a href="shop.html"   class="nav-link" data-page="shop.html">Merch</a>
    <a href="about.html"  class="nav-link" data-page="about.html">About</a>
    <a href="shop.html" id="navCartBtnMobile" class="btn btn-outline nav-cart-btn" style="position:relative;cursor:pointer">
      🛒
      <span class="cart-badge" id="cartBadgeMobile" style="display:none">0</span>
    </a>
  </div>
</nav>
<script>
  // If on shop page, make cart button open the panel instead of navigating
  (function() {
    var desktopBtn = document.getElementById('navCartBtn');
    var mobileBtn = document.getElementById('navCartBtnMobile');
    var isShop = window.location.pathname.indexOf('shop.html') !== -1;
    [desktopBtn, mobileBtn].forEach(function(btn) {
      if (!btn) return;
      if (!isShop) return;
      btn.addEventListener('click', function(e) {
        e.preventDefault();
        // Wait for openCart to be defined (shop.html defines it)
        if (typeof openCart === 'function') {
          openCart();
        }
      });
    });
  })();

  // Keep mobile/desktop cart badges in sync
  (function() {
    var desktopBadge = document.getElementById('cartBadge');
    var mobileBadge = document.getElementById('cartBadgeMobile');
    if (!desktopBadge || !mobileBadge) return;
    var observer = new MutationObserver(function() {
      mobileBadge.textContent = desktopBadge.textContent;
      mobileBadge.style.display = desktopBadge.style.display;
    });
    observer.observe(desktopBadge, { childList: true, characterData: true, subtree: true, attributes: true, attributeFilter: ['style'] });
    mobileBadge.textContent = desktopBadge.textContent;
    mobileBadge.style.display = desktopBadge.style.display;
  })();

  // Mobile menu
  (function() {
    var nav = document.querySelector('nav');
    var btn = document.getElementById('navMenuBtn');
    if (!nav || !btn) return;
    btn.addEventListener('click', function() {
      var isOpen = nav.classList.toggle('open');
      btn.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
    });
    document.querySelectorAll('#navMenuPanel a').forEach(function(link) {
      link.addEventListener('click', function() {
        nav.classList.remove('open');
        btn.setAttribute('aria-expanded', 'false');
      });
    });
  })();

  // Load custom logo if set
  (async function loadNavLogo() {
    try {
      const res = await fetch('https://king-s-youth.onrender.com/api/settings/public');
      if (!res.ok) return;
      const data = await res.json();
      if (data.site_logo) {
        const icon = document.getElementById('navLogoIcon');
        if (icon) {
          icon.style.cssText = 'width:40px;height:40px;overflow:hidden;background:transparent;clip-path:none;padding:0';
          icon.innerHTML = '<img src="' + data.site_logo + '" style="width:100%;height:100%;object-fit:contain">';
        }
      }
    } catch(e) {}
  })();
</script>
