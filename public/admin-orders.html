<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>King's-Youth | Admin — Orders</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="shared.css">
</head>
<body>
<div class="page-wrap">
<div class="admin-layout">
  <div id="admin-nav-root"></div>
  <main class="admin-content">
    <div class="admin-top">
      <h2 class="admin-page-title">Orders</h2>
      <div style="display:flex;gap:.75rem;align-items:center;flex-wrap:wrap">
        <select class="form-select" id="filterStatus" style="width:160px" onchange="render()">
          <option value="">All Statuses</option>
          <option>pending</option><option>confirmed</option><option>shipped</option><option>completed</option><option>cancelled</option>
        </select>
        <button class="export-btn" onclick="exportOrders()">📊 Export Orders</button>
      </div>
    </div>

    <div class="stats-grid" style="margin-bottom:1.5rem">
      <div class="stat-card"><div class="stat-card-label">Total Orders</div><div class="stat-card-value" id="sTotalOrders">0</div></div>
      <div class="stat-card"><div class="stat-card-label">Total Revenue</div><div class="stat-card-value" id="sTotalRev" style="color:var(--accent)">₱0</div></div>
      <div class="stat-card"><div class="stat-card-label">Pending</div><div class="stat-card-value" id="sPending" style="color:var(--gold)">0</div></div>
      <div class="stat-card"><div class="stat-card-label">Completed</div><div class="stat-card-value" id="sCompleted" style="color:var(--success)">0</div></div>
    </div>

    <div class="data-table-wrap">
      <div class="table-header">
        <div class="table-search"><input type="text" placeholder="Search orders..." oninput="render()" id="searchInput"></div>
        <span id="countLabel" style="font-size:.85rem;color:var(--white-dim)">0 orders</span>
      </div>
      <div style="overflow-x:auto">
        <table><thead><tr><th>#</th><th>Customer</th><th>Contact</th><th>Items</th><th>Total</th><th>Date</th><th>Status</th><th>Actions</th></tr></thead>
        <tbody id="ordersBody"><tr><td colspan="8" style="text-align:center;color:var(--white-dim);padding:2rem">No orders yet</td></tr></tbody></table>
      </div>
    </div>
  </main>
</div>
</div>

<!-- ORDER DETAIL MODAL -->
<div class="modal-overlay" id="orderModal">
  <div class="modal" style="max-width:560px">
    <button class="modal-close" onclick="closeModal('orderModal')">✕</button>
    <h2 class="modal-title">Order Details</h2>
    <div id="orderDetail"></div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>
<script src="shared.js"></script>
<script>
  requireAdmin();
  fetch('admin-nav.html').then(r=>r.text()).then(h=>{
    document.getElementById('admin-nav-root').innerHTML=h;
    document.querySelectorAll('.admin-nav-item[data-page]').forEach(a=>{ a.classList.toggle('active', a.dataset.page==='admin-orders.html'); });
  });
  initModalOverlayClose();

  let allOrders = [];

  function updateStats() {
    document.getElementById('sTotalOrders').textContent=allOrders.length;
    document.getElementById('sTotalRev').textContent='₱'+allOrders.reduce((s,o)=>s+Number(o.total),0).toLocaleString();
    document.getElementById('sPending').textContent=allOrders.filter(o=>o.status==='pending').length;
    document.getElementById('sCompleted').textContent=allOrders.filter(o=>o.status==='completed').length;
  }

  function getFiltered() {
    const fs=document.getElementById('filterStatus').value;
    const search=(document.getElementById('searchInput').value||'').toLowerCase();
    let data=allOrders;
    if (fs)     data=data.filter(o=>o.status===fs);
    if (search) data=data.filter(o=>`${o.customer_name} ${o.customer_phone} ${o.customer_email}`.toLowerCase().includes(search));
    return data;
  }

  async function render() {
    const tbody=document.getElementById('ordersBody');
    tbody.innerHTML='<tr><td colspan="8" style="text-align:center;color:var(--white-dim);padding:2rem">Loading…</td></tr>';
    try {
      allOrders = await Orders.getAll();
      updateStats();
      filterRender();
    } catch(e) { tbody.innerHTML='<tr><td colspan="8" style="text-align:center;color:var(--danger);padding:2rem">Failed to load</td></tr>'; }
  }

  function filterRender() {
    const data=getFiltered();
    document.getElementById('countLabel').textContent=data.length+' orders';
    const tbody=document.getElementById('ordersBody');
    if (!data.length) { tbody.innerHTML='<tr><td colspan="8" style="text-align:center;color:var(--white-dim);padding:2rem">No orders found</td></tr>'; return; }
    tbody.innerHTML=data.map((o,i)=>`
      <tr>
        <td>${i+1}</td>
        <td><strong>${o.customer_name}</strong></td>
        <td>${o.customer_phone||'—'}</td>
        <td style="max-width:200px">${(o.items||[]).map(it=>it.name+(it.size?' ('+it.size+')':'')+' ×'+it.qty).join(', ')}</td>
        <td style="font-family:'Barlow Condensed',sans-serif;font-weight:700;color:var(--accent)">₱${Number(o.total).toLocaleString()}</td>
        <td>${new Date(o.ordered_at).toLocaleDateString()}</td>
        <td>
          <select class="form-select" style="width:110px;padding:.3rem" onchange="updateStatus(${o.id},this.value)">
            ${['pending','confirmed','shipped','completed','cancelled'].map(s=>`<option${o.status===s?' selected':''}>${s}</option>`).join('')}
          </select>
        </td>
        <td style="display:flex;gap:.4rem">
          <button class="action-btn" onclick="viewOrder(${o.id})">View</button>
          <button class="action-btn del" onclick="deleteOrder(${o.id})">Del</button>
        </td>
      </tr>
    `).join('');
  }

  async function updateStatus(id, status) {
    try {
      await Orders.updateStatus(id, status);
      const o=allOrders.find(x=>x.id===id);
      if (o) o.status=status;
      updateStats();
      toast('Order status updated.','info');
    } catch(err) { toast('Update failed: '+err.message,'error'); }
  }

  function viewOrder(id) {
    const o=allOrders.find(x=>x.id===id);
    if (!o) return;
    document.getElementById('orderDetail').innerHTML=`
      <div style="font-size:.9rem">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:1rem">
          <div><div style="color:var(--accent);font-size:.7rem;letter-spacing:2px;text-transform:uppercase;margin-bottom:2px">Customer</div>${o.customer_name}</div>
          <div><div style="color:var(--accent);font-size:.7rem;letter-spacing:2px;text-transform:uppercase;margin-bottom:2px">Contact</div>${o.customer_phone||'—'}</div>
          <div><div style="color:var(--accent);font-size:.7rem;letter-spacing:2px;text-transform:uppercase;margin-bottom:2px">Email</div>${o.customer_email||'—'}</div>
          <div><div style="color:var(--accent);font-size:.7rem;letter-spacing:2px;text-transform:uppercase;margin-bottom:2px">Date</div>${new Date(o.ordered_at).toLocaleString()}</div>
          <div style="grid-column:1/-1"><div style="color:var(--accent);font-size:.7rem;letter-spacing:2px;text-transform:uppercase;margin-bottom:2px">Delivery Address</div>${o.customer_address||'—'}</div>
        </div>
        <div style="border-top:1px solid var(--border);padding-top:1rem">
          <div style="color:var(--accent);font-size:.7rem;letter-spacing:2px;text-transform:uppercase;margin-bottom:.75rem">Items</div>
          ${(o.items||[]).map(it=>`
            <div style="display:flex;justify-content:space-between;padding:.5rem 0;border-bottom:1px solid var(--border)">
              <span>${it.name}${it.size?' ('+it.size+')':''} × ${it.qty}</span>
              <span style="color:var(--accent);font-family:'Barlow Condensed',sans-serif;font-weight:700">₱${(it.price*it.qty).toLocaleString()}</span>
            </div>
          `).join('')}
          <div style="display:flex;justify-content:space-between;margin-top:.75rem;font-family:'Bebas Neue',cursive;font-size:1.3rem">
            <span>Total</span><span style="color:var(--accent)">₱${Number(o.total).toLocaleString()}</span>
          </div>
        </div>
      </div>
    `;
    openModal('orderModal');
  }

  async function deleteOrder(id) {
    if (!confirm('Delete this order?')) return;
    try {
      await Orders.delete(id);
      allOrders=allOrders.filter(o=>o.id!==id);
      filterRender(); updateStats();
      toast('Order deleted.','info');
    } catch(err) { toast('Delete failed: '+err.message,'error'); }
  }

  function exportOrders() {
    exportWithAuth(Orders.exportURL());
    toast('Downloading CSV… 📊','success');
  }

  render();
</script>
</body>
</html>
