<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>King-Youth | Events</title>
  <link rel="stylesheet" href="shared.css">
  <style>
    .events-hero { background: var(--deep); border-bottom: 1px solid var(--border); padding: 5rem 2rem 3rem; text-align: center; }
    .filter-bar { display: flex; gap: .75rem; justify-content: center; flex-wrap: wrap; margin-bottom: 3rem; }
    .filter-btn { padding: .4rem 1.25rem; border: 1px solid var(--border); background: none; color: var(--white-dim); border-radius: 20px; cursor: pointer; font-family: 'Barlow Condensed',sans-serif; font-weight: 600; font-size: .85rem; letter-spacing: 1px; transition: all .2s; }
    .filter-btn:hover, .filter-btn.active { border-color: var(--blue); color: var(--blue-light); background: var(--blue-glow); }
    .ev-modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.75); z-index:2000; align-items:center; justify-content:center; padding:1rem; }
    .ev-modal-overlay.open { display:flex; }
    .ev-modal-box { background:var(--card); border:1px solid var(--border); border-radius:20px; width:100%; max-width:680px; max-height:90vh; overflow-y:auto; position:relative; }
    .ev-modal-hero { width:100%; height:240px; background:var(--deep); border-radius:20px 20px 0 0; overflow:hidden; position:relative; }
    .ev-modal-hero img { width:100%; height:100%; object-fit:cover; }
    .ev-modal-hero-placeholder { width:100%; height:100%; display:flex; align-items:center; justify-content:center; font-size:5rem; background:linear-gradient(135deg,var(--deep),var(--black)); }
    .ev-modal-body { padding:2rem; }
    .ev-modal-close { position:absolute; top:1rem; right:1rem; background:rgba(0,0,0,.6); border:1px solid rgba(255,255,255,.2); color:#fff; width:36px; height:36px; border-radius:50%; cursor:pointer; font-size:1rem; display:flex; align-items:center; justify-content:center; z-index:10; }
    .ev-modal-badges { display:flex; gap:.5rem; flex-wrap:wrap; margin-bottom:1rem; }
    .ev-modal-title { font-family:'Bebas Neue',cursive; font-size:2.2rem; letter-spacing:2px; margin-bottom:1rem; line-height:1.1; }
    .ev-modal-details { display:grid; grid-template-columns:1fr 1fr; gap:.75rem; margin-bottom:1.5rem; }
    .ev-modal-detail-item { display:flex; align-items:flex-start; gap:.5rem; font-size:.9rem; color:var(--white-dim); }
    .ev-modal-desc-label { font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:.75rem; letter-spacing:3px; text-transform:uppercase; color:var(--accent); margin-bottom:.5rem; }
    .ev-modal-desc { font-size:.95rem; line-height:1.8; color:var(--white-dim); white-space:pre-wrap; margin-bottom:1.5rem; background:var(--deep); border:1px solid var(--border); border-radius:10px; padding:1rem; }
    .ev-session-card { background:var(--deep); border:1px solid var(--border); border-radius:10px; padding:.875rem 1rem; margin-bottom:.5rem; display:flex; justify-content:space-between; align-items:center; gap:1rem; }
    .ev-session-name { font-weight:600; font-size:.95rem; }
    .ev-session-info { font-size:.8rem; color:var(--white-dim); margin-top:2px; }
    .ev-session-spots { font-family:'Barlow Condensed',sans-serif; font-size:.85rem; color:var(--accent); white-space:nowrap; flex-shrink:0; }
    .ev-modal-footer { display:flex; gap:.75rem; justify-content:flex-end; flex-wrap:wrap; padding-top:1rem; border-top:1px solid var(--border); }
    .cap-bar-wrap { margin-bottom:1.25rem; }
    .cap-bar { height:6px; background:var(--deep); border-radius:3px; overflow:hidden; margin-bottom:4px; }
    .cap-fill { height:100%; background:var(--blue); border-radius:3px; }
    .cap-label { font-size:.78rem; color:var(--white-dim); }
  </style>
</head>
<body>
<div id="nav-root"></div>
<div class="page-wrap">
  <div class="events-hero">
    <span style="font-family:'Barlow Condensed',sans-serif;font-size:.8rem;letter-spacing:5px;text-transform:uppercase;color:var(--accent);font-weight:600">King's Youth Ministry</span>
    <h1 style="font-family:'Bebas Neue',cursive;font-size:clamp(3rem,8vw,6rem);letter-spacing:3px;margin:.5rem 0">All <span style="color:var(--blue-light)">Events</span></h1>
    <p style="color:var(--white-dim);font-size:1rem;max-width:500px;margin:0 auto">Register for upcoming Youth Camp events and be part of the GREATER movement.</p>
  </div>
  <div class="section">
    <div class="filter-bar">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="open">Open</button>
      <button class="filter-btn" data-filter="upcoming">Upcoming</button>
      <button class="filter-btn" data-filter="closed">Closed</button>
    </div>
    <div class="events-grid" id="eventsGrid">
      <div class="empty-state" style="grid-column:1/-1"><div class="icon">📅</div><h3>No Events Posted Yet</h3><p>Check back soon!</p></div>
    </div>
  </div>
  <div id="footer-root"></div>
</div>

<!-- EVENT DETAIL MODAL -->
<div class="ev-modal-overlay" id="evDetailModal">
  <div class="ev-modal-box">
    <button class="ev-modal-close" id="evModalCloseBtn">✕</button>
    <div class="ev-modal-hero" id="evModalHero"><div class="ev-modal-hero-placeholder">📅</div></div>
    <div class="ev-modal-body">
      <div class="ev-modal-badges" id="evModalBadges"></div>
      <div class="ev-modal-title" id="evModalTitle"></div>
      <div class="ev-modal-details" id="evModalDetails"></div>
      <div class="cap-bar-wrap" id="evModalCapacity"></div>
      <div id="evModalDescWrap" style="display:none">
        <div class="ev-modal-desc-label">About This Event</div>
        <div class="ev-modal-desc" id="evModalDesc"></div>
      </div>
      <div id="evModalSessionsWrap" style="display:none">
        <div class="ev-modal-desc-label" style="margin-bottom:.75rem">Divided Sessions</div>
        <div id="evModalSessions"></div>
      </div>
      <div class="ev-modal-footer" id="evModalFooter"></div>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>
<script src="shared.js"></script>
<script>
  fetch('nav.html').then(r=>r.text()).then(h=>{ document.getElementById('nav-root').innerHTML=h; setActiveNav(); updateCartBadge(); });
  fetch('footer.html').then(r=>r.text()).then(h=>{ document.getElementById('footer-root').innerHTML=h; loadFooterInfo(); });

  let allEvents = [];
  let currentFilter = 'all';

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', function() {
      currentFilter = this.dataset.filter;
      document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
      this.classList.add('active');
      renderGrid();
    });
  });

  function renderGrid() {
    const grid = document.getElementById('eventsGrid');
    const data = currentFilter === 'all' ? allEvents : allEvents.filter(e=>e.status===currentFilter);
    if (!data.length) {
      grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="icon">📅</div><h3>No Events Found</h3><p>Try a different filter.</p></div>';
      return;
    }
    grid.innerHTML = data.map(ev=>eventCardHTML(ev)).join('');
    grid.querySelectorAll('.view-details-btn').forEach(btn => {
      btn.addEventListener('click', function() { openEventDetail(parseInt(this.dataset.id)); });
    });
  }

  async function openEventDetail(id) {
    const ev = allEvents.find(e=>e.id===id);
    if (!ev) return;
    const statusClass = {open:'success',upcoming:'info',closed:'danger'}[ev.status]||'info';
    const spotsLeft = ev.max_participants - (ev.registered||0);
    const pct = Math.min(100, Math.round(((ev.registered||0)/ev.max_participants)*100));

    // Hero
    document.getElementById('evModalHero').innerHTML = ev.media?.[0]
      ? `<img src="${ev.media[0]}" alt="${ev.name}">`
      : '<div class="ev-modal-hero-placeholder">📅</div>';

    document.getElementById('evModalBadges').innerHTML =
      `<span class="badge badge-${statusClass}">${ev.status}</span>` +
      (ev.fee > 0 ? `<span class="badge badge-gold">₱${Number(ev.fee).toLocaleString()}</span>` : '<span class="badge badge-success">FREE</span>');

    document.getElementById('evModalTitle').textContent = ev.name;

    const dets = [];
    if (ev.date) dets.push(['📅', formatDate(ev.date) + (ev.end_date ? ' – ' + formatDate(ev.end_date) : '')]);
    if (ev.time) dets.push(['🕐', ev.time]);
    if (ev.location) dets.push(['📍', ev.location]);
    if (ev.deadline) dets.push(['⏳', 'Deadline: ' + formatDate(ev.deadline)]);
    document.getElementById('evModalDetails').innerHTML = dets.map(([i,t])=>
      `<div class="ev-modal-detail-item"><span>${i}</span><span>${t}</span></div>`).join('');

    document.getElementById('evModalCapacity').innerHTML =
      `<div class="cap-bar"><div class="cap-fill" style="width:${pct}%"></div></div>
       <span class="cap-label">${spotsLeft > 0 ? spotsLeft+' spots left of '+ev.max_participants : '⚠️ FULL — No spots remaining'}</span>`;

    // Description
    if (ev.description && ev.description.trim()) {
      document.getElementById('evModalDescWrap').style.display = 'block';
      document.getElementById('evModalDesc').textContent = ev.description;
    } else {
      document.getElementById('evModalDescWrap').style.display = 'none';
    }

    // Sessions
    const sessWrap = document.getElementById('evModalSessionsWrap');
    const sessList = document.getElementById('evModalSessions');
    sessWrap.style.display = 'none';
    try {
      const sessions = await Sessions.getByEvent(id);
      if (sessions && sessions.length) {
        sessWrap.style.display = 'block';
        sessList.innerHTML = sessions.map(s => {
          const info = [s.date ? formatDate(String(s.date).substring(0,10)) : '', s.time||''].filter(Boolean).join(' · ');
          return `<div class="ev-session-card">
            <div>
              <div class="ev-session-name">${s.name}</div>
              ${info ? `<div class="ev-session-info">${info}</div>` : ''}
              ${s.description ? `<div class="ev-session-info" style="margin-top:3px;font-style:italic">${s.description}</div>` : ''}
            </div>
            ${s.max_participants ? `<div class="ev-session-spots">${s.max_participants} slots</div>` : ''}
          </div>`;
        }).join('');
      }
    } catch(e) {}

    // Footer
    document.getElementById('evModalFooter').innerHTML = ev.status==='open' && spotsLeft>0
      ? `<a href="register.html?event=${ev.id}" class="btn btn-primary">Register Now →</a>`
      : `<span class="btn btn-ghost" style="cursor:default">${ev.status==='open'?'Event Full':'Registration Closed'}</span>`;

    document.getElementById('evDetailModal').classList.add('open');
  }

  document.getElementById('evModalCloseBtn').addEventListener('click', ()=>document.getElementById('evDetailModal').classList.remove('open'));
  document.getElementById('evDetailModal').addEventListener('click', function(e){ if(e.target===this) this.classList.remove('open'); });

  async function loadEvents() {
    try {
      allEvents = await Events.getAll();
      allEvents = allEvents.map(e=>({...e,
        date:     e.date?String(e.date).substring(0,10):e.date,
        end_date: e.end_date?String(e.end_date).substring(0,10):e.end_date,
        deadline: e.deadline?String(e.deadline).substring(0,10):e.deadline,
      }));
      renderGrid();
    } catch(e) {
      document.getElementById('eventsGrid').innerHTML='<div class="empty-state" style="grid-column:1/-1"><div class="icon">⚠️</div><h3>Could not load events</h3><p>Please try again later.</p></div>';
    }
  }
  loadEvents();
</script>
</body>
</html>
